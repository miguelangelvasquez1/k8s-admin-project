apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: wazuh-dashboard-pvc
  namespace: epm
spec:
  accessModes: [ReadWriteOnce]
  resources:
    requests:
      storage: 1Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: epm-wazuh-dashboard
  namespace: epm
spec:
  replicas: 1
  selector:
    matchLabels:
      app: epm-wazuh-dashboard
  template:
    metadata:
      labels:
        app: epm-wazuh-dashboard
    spec:
      containers:
      - name: wazuh-dashboard
        image: wazuh/wazuh-dashboard:4.7.3
        env:
        - name: INDEXER_USERNAME
          value: "admin"
        - name: INDEXER_PASSWORD
          value: "Epm@Index2025!"
        - name: WAZUH_API_URL
          value: "https://wazuh-manager"
        - name: WAZUH_API_PORT
          value: "55000"
        - name: API_USERNAME
          value: "wazuh-wui"
        - name: API_PASSWORD
          value: "Epm@SOC2025!"
        ports:
        - containerPort: 5601
        volumeMounts:
        - name: dashboard-storage
          mountPath: /usr/share/wazuh-dashboard/data
      volumes:
      - name: dashboard-storage
        persistentVolumeClaim:
          claimName: wazuh-dashboard-pvc
---
apiVersion: v1
kind: Service
metadata:
  name: epm-wazuh-dashboard-svc
  namespace: epm
spec:
  selector:
    app: epm-wazuh-dashboard
  ports:
  - port: 443
    targetPort: 5601
  type: NodePort