apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: opensearch-pvc
  namespace: epm
spec:
  accessModes: [ReadWriteOnce]
  resources:
    requests:
      storage: 2Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: epm-opensearch
  namespace: epm
spec:
  replicas: 1
  selector:
    matchLabels:
      app: epm-opensearch
  template:
    metadata:
      labels:
        app: epm-opensearch
    spec:
      initContainers:
      - name: sysctl
        image: busybox
        command: ['sh', '-c', 'sysctl -w vm.max_map_count=262144']
        securityContext:
          privileged: true
      containers:
      - name: opensearch
        image: opensearchproject/opensearch:2.11.0
        env:
        - name: discovery.type
          value: "single-node"
        - name: OPENSEARCH_JAVA_OPTS
          value: "-Xms512m -Xmx512m"
        - name: DISABLE_SECURITY_PLUGIN
          value: "true"
        - name: OPENSEARCH_INITIAL_ADMIN_PASSWORD
          value: "Epm@Index2025!"
        ports:
        - containerPort: 9200
        volumeMounts:
        - name: opensearch-storage
          mountPath: /usr/share/opensearch/data
      volumes:
      - name: opensearch-storage
        persistentVolumeClaim:
          claimName: opensearch-pvc
---
apiVersion: v1
kind: Service
metadata:
  name: wazuh-indexer
  namespace: epm
spec:
  selector:
    app: epm-opensearch
  ports:
  - port: 9200
    targetPort: 9200
  type: ClusterIP
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: opensearch-dashboard-pvc
  namespace: epm
spec:
  accessModes: [ReadWriteOnce]
  resources:
    requests:
      storage: 1Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: epm-wazuh-dashboard
  namespace: epm
spec:
  replicas: 1
  selector:
    matchLabels:
      app: epm-wazuh-dashboard
  template:
    metadata:
      labels:
        app: epm-wazuh-dashboard
    spec:
      containers:
      - name: opensearch-dashboards
        image: opensearchproject/opensearch-dashboards:2.11.0
        env:
        - name: OPENSEARCH_HOSTS
          value: '["http://wazuh-indexer:9200"]'
        - name: DISABLE_SECURITY_DASHBOARDS_PLUGIN
          value: "true"
        ports:
        - containerPort: 5601
        volumeMounts:
        - name: dashboard-storage
          mountPath: /usr/share/opensearch-dashboards/data
      volumes:
      - name: dashboard-storage
        persistentVolumeClaim:
          claimName: opensearch-dashboard-pvc
---
apiVersion: v1
kind: Service
metadata:
  name: epm-wazuh-dashboard-svc
  namespace: epm
spec:
  selector:
    app: epm-wazuh-dashboard
  ports:
  - port: 443
    targetPort: 5601
  type: NodePort