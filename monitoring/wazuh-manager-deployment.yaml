apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: wazuh-manager-pvc
  namespace: epm
spec:
  accessModes: [ReadWriteOnce]
  resources:
    requests:
      storage: 1Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: epm-wazuh-manager
  namespace: epm
spec:
  replicas: 1
  selector:
    matchLabels:
      app: epm-wazuh-manager
  template:
    metadata:
      labels:
        app: epm-wazuh-manager
    spec:
      containers:
      - name: wazuh-manager
        image: wazuh/wazuh-manager:4.7.3
        env:
        - name: WAZUH_API_USERNAME
          value: "wazuh-wui"
        - name: WAZUH_API_PASSWORD
          value: "Epm@SOC2025!"
        - name: INDEXER_URL
          value: "https://wazuh-indexer:9200"
        - name: INDEXER_USERNAME
          value: "admin"
        - name: INDEXER_PASSWORD
          value: "Epm@Index2025!"
        ports:
        - containerPort: 1514
        - containerPort: 1515
        - containerPort: 55000
        volumeMounts:
        - name: wazuh-manager-storage
          mountPath: /var/ossec/data
        - name: wazuh-rules
          mountPath: /var/ossec/etc/rules/local_rules.xml
          subPath: custom-rules.xml
      volumes:
      - name: wazuh-manager-storage
        persistentVolumeClaim:
          claimName: wazuh-manager-pvc
      - name: wazuh-rules
        configMap:
          name: wazuh-rules
---
apiVersion: v1
kind: Service
metadata:
  name: wazuh-manager
  namespace: epm
spec:
  selector:
    app: epm-wazuh-manager
  ports:
  - name: agent
    port: 1514
    targetPort: 1514
  - name: registration
    port: 1515
    targetPort: 1515
  - name: api
    port: 55000
    targetPort: 55000
  type: ClusterIP