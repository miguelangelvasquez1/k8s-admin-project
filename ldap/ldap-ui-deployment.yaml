apiVersion: apps/v1
kind: Deployment
metadata:
  name: epm-ldap-ui
  namespace: epm
spec:
  replicas: 2
  selector:
    matchLabels:
      app: epm-ldap-ui
  template:
    metadata:
      labels:
        app: epm-ldap-ui
    spec:
      containers:
      - name: phpldapadmin
        image: osixia/phpldapadmin:0.9.0
        env:
        - name: PHPLDAPADMIN_LDAP_HOSTS
          value: "openldap"
        - name: PHPLDAPADMIN_HTTPS
          value: "false"
        ports:
        - containerPort: 80
---
apiVersion: v1
kind: Service
metadata:
  name: epm-ldap-ui-svc
  namespace: epm
spec:
  selector:
    app: epm-ldap-ui
  ports:
  - port: 8081
    targetPort: 80
  type: NodePort